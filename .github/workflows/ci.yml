name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Backend: Build and Test - only on Go changes
  backend:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, '.go') ||
      contains(github.event.head_commit.modified, 'go.mod') ||
      contains(github.event.head_commit.modified, 'go.sum') ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20'

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

  # Frontend: Build - only on web changes
  frontend:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'web/') ||
      github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

  # Linting - only on Go changes
  lint:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, '.go') ||
      contains(github.event.head_commit.modified, 'go.mod') ||
      contains(github.event.head_commit.modified, 'go.sum') ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.20'

      - name: Run golint
        run: |
          go install golang.org/x/lint/golint@latest
          golint -set_exit_status ./...

  # Dependency Review - runs always
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
